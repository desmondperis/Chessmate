   PUZZLES
   ========================================================================== */
function shufflePuzzles(){
  pz.order = PUZZLES.map((_, i) => i);
  for (let i = pz.order.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); const t = pz.order[i]; pz.order[i] = pz.order[j]; pz.order[j] = t; }
  pz.pos = 0;
}
function startPuzzles(){
  mode = 'puzzle';
  setModeUI();
  hideBanner();
  if (!pz.order.length) shufflePuzzles();
  loadPuzzle(pz.order[pz.pos]);
}
function loadPuzzle(i){
  pz.i = i; pz.solIdx = 0; pz.solved = false; pz.solving = true;
  const p = PUZZLES[i];
  game = new Chess(p.fen);
  gameOver = false; selected = null; legalTargets = []; lastMove = null; viewPly = null; hintMove = null; posId++;
  pz.sideToMove = game.turn();
  orientation = pz.sideToMove;
  buildSquares(); renderPosition(); renderMoveList(); renderCaptured();
  oppName.textContent = 'Puzzle ' + (pz.pos + 1) + ' / ' + PUZZLES.length;
  oppRating.textContent = p.theme + ' · ' + p.rating;
  oppAvatar.textContent = '🧩';
  meName.textContent = (pz.sideToMove === 'w' ? 'White' : 'Black') + ' to move';
  meRating.textContent = 'Find the mate';
  pzResult.textContent = ''; pzResult.className = 'pz-result';
  evalFill.style.height = '50%'; evalNum.textContent = '';
}
function handlePuzzleProgress(){
  // called after a user move in puzzle mode
  const p = PUZZLES[pz.i];
  const hist = game.history({ verbose: true });
  const played = hist[hist.length - 1];
  const expected = p.moves[pz.solIdx];
  const playedUci = played.from + played.to + (played.promotion || '');
  if (playedUci === expected || playedUci === expected + 'q'){
    pz.solIdx++;
    if (pz.solIdx >= p.moves.length){
      pz.solved = true; pz.solving = false;
      pzResult.textContent = '✓ Solved'; pzResult.className = 'pz-result good';
      Sound.win();
      return;
    }
    // play opponent's reply from solution
    pzResult.textContent = 'Correct — keep going'; pzResult.className = 'pz-result good';
    const reply = p.moves[pz.solIdx];
    setTimeout(() => {
      const m = game.move({ from: reply.slice(0,2), to: reply.slice(2,4), promotion: reply[4] || 'q' });
      if (m){ lastMove = { from: m.from, to: m.to }; posId++; if (S.animate) animateMove(m); else renderPosition(); soundForMove(m); renderMoveList(); }
      pz.solIdx++;
      pz.solving = true;
      if (pz.solIdx >= p.moves.length){ pz.solved = true; pz.solving = false; pzResult.textContent = '✓ Solved'; pzResult.className = 'pz-result good'; Sound.win(); }
    }, 420);
  } else {
    // wrong — undo and let them retry
    pzResult.textContent = '✗ Not the move — try again'; pzResult.className = 'pz-result bad';
    Sound.check();
    setTimeout(() => { game.undo(); posId++; renderPosition(); renderMoveList(); }, 480);
  }
}
function retryPuzzle(){ loadPuzzle(pz.i); }
function nextPuzzle(){ pz.pos++; if (pz.pos >= pz.order.length) shufflePuzzles(); loadPuzzle(pz.order[pz.pos]); }
async function puzzleHint(){
  const p = PUZZLES[pz.i];
  const uci = p.moves[pz.solIdx];
  if (uci){ hintMove = { from: uci.slice(0,2), to: uci.slice(2,4) }; drawArrow(); setTimeout(() => { hintMove = null; drawArrow(); }, 2500); }
}

    else { label = g.result === 'win' ? 'Won' : g.result === 'loss' ? 'Lost' : 'Draw'; cls = g.result === 'win' ? 'w' : g.result === 'loss' ? 'l' : 'd'; }

function resumeParkedGame(g){

    if (games.length > 50) games.length = 50;

}

function wireControls(){

  const startFromLanding = () => {
    createUser(($('nameInput').value || '').trim() || 'Player');

  };
  $('landingStart').onclick = startFromLanding;
  $('nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') startFromLanding(); });
  $('userToggle').onclick = () => { const showingPick = $('userPick').style.display !== 'none'; renderLanding(showingPick ? 'new' : 'pick'); };
  $('btnSwitchUser').onclick = () => { closeSettings(); showLanding('pick'); };

  $('btnFlip').onclick = () => { orientation = orientation === 'w' ? 'b' : 'w'; buildSquares(); renderPosition(); renderClocks(); renderCaptured(); };
  $('btnUndo').onclick = () => {
    if (mode === 'puzzle'){ retryPuzzle(); return; }
    if (viewPly != null) goLive();
    if (thinking){ Engine.stop(); }
    // take back a full move pair vs a bot so it's your turn again; a single ply in 2-player
    game.undo();
    if (mode === 'play' && S.strength !== 'two' && game.turn() !== S.resolvedYou && game.history().length) game.undo();
    gameOver = false; hideBanner(); selected = null; legalTargets = [];
    const h = game.history({ verbose: true }); lastMove = h.length ? { from: h[h.length-1].from, to: h[h.length-1].to } : null;
    posId++; renderPosition(); renderMoveList(); renderCaptured(); refreshEval(); persistGame();
  };
  $('btnHint').onclick = () => { mode === 'puzzle' ? puzzleHint() : showHint(); };
  $('btnResign').onclick = () => {
    if (mode === 'puzzle'){ nextPuzzle(); return; }
    if (mode === 'analysis'){ toast('Analysis board — nothing to resign.'); return; }
    if (viewPly != null) goLive();
    if (S.strength === 'two'){
      // 2-player: the side to move resigns; other side wins
      const loser = game.turn(); const winner = loser === 'w' ? 'b' : 'w';
      archiveTwoPlayer(winner, (loser === 'w' ? 'White' : 'Black') + ' resigned');
      showBanner((winner === 'w' ? 'White' : 'Black') + ' wins', (loser === 'w' ? 'White' : 'Black') + ' resigned');
      Sound.end();
      return;
    }
    if (clock.on){
      // timed game: resigning is a real loss — warn first
      if (!confirm('This is a timed game. Resigning will count as a loss. Resign?')) return;
      if (thinking) Engine.stop();
      concludeGame('loss', 'Resigned');
      showBanner('You resigned', BOTS[S.strength].name + ' wins · ' + recordStr()); Sound.end();
    } else {
      // unlimited game: park it as in-progress (no loss) and start fresh
      const hasMoves = game.history().length > 0;
      if (thinking) Engine.stop();
      if (hasMoves){ parkGame(); newGame(); toast('Game parked in Past games — resume it any time.'); }
      else { newGame(); }
    }
  };
  $('btnFirst').onclick = () => gotoPly(0);
  $('btnPrev').onclick = () => gotoPly((viewPly == null ? game.history().length : viewPly) - 1);
  $('btnNext').onclick = () => gotoPly((viewPly == null ? game.history().length : viewPly) + 1);
  $('btnLast').onclick = () => goLive();

  movesEl.onclick = (e) => { const s = e.target.closest('.san'); if (s && s.dataset.ply) gotoPly(+s.dataset.ply); };

  tabPlay.onclick = () => {
    if (mode === 'play') return;
    mode = 'play';
    if (liveGame && !liveGame.over && liveGame.moves && liveGame.moves.length) resumeGame(liveGame);
    else newGame();
  };
  tabPuzzles.onclick = () => { if (mode !== 'puzzle') startPuzzles(); };
  tabAnalysis.onclick = () => { if (mode !== 'analysis'){ mode = 'analysis'; newGame(); toast('Analysis: move both sides freely.'); } };

  $('btnSettings').onclick = openSettings;
  $('btnPalette').onclick = () => { S.palette = S.palette === 'dark' ? 'light' : 'dark'; applyPalette(); save(); };
  $('settingsClose').onclick = closeSettings;
  $('settingsBackdrop').onclick = closeSettings;

  // banner actions
  $('bannerNew').onclick = () => { if (mode === 'puzzle'){ nextPuzzle(); } else { newGame(); } };
  $('bannerReview').onclick = () => { hideBanner(); gotoPly(0); };

  // puzzle controls (shared buttons relabel via CSS by mode)
  // segmented settings
  wireSeg('segTheme', v => { S.theme = v; applyTheme(); save(); });
  wireSeg('segStrength', v => { S.strength = v; save(); applyBot(); updateSetupVisibility(); });
  wireSeg('segColor', v => { S.youAre = v; save(); });
  wireSeg('segTime', v => { S.time = v; save(); });
  tglSound.onchange = () => { S.sound = tglSound.checked; save(); if (S.sound) Sound.prime(); };
  tglCoords.onchange = () => { S.coords = tglCoords.checked; save(); buildSquares(); renderPosition(); };
  tglAnim.onchange = () => { S.animate = tglAnim.checked; save(); };
  tglDots.onchange = () => { S.showMoves = tglDots.checked; save(); refreshHighlights(); };
  tglEval.onchange = () => { S.showEval = tglEval.checked; save(); document.body.dataset.eval = S.showEval ? 'on' : 'off'; if (S.showEval) refreshEval(); };
  document.body.dataset.eval = S.showEval ? 'on' : 'off';

  // apply-and-restart button in settings
  $('settingsApply').onclick = () => { closeSettings(); if (mode === 'puzzle'){ setModeUI(); } else { newGame(); } };

  // keyboard nav
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') $('btnPrev').click();
    else if (e.key === 'ArrowRight') $('btnNext').click();
    else if (e.key === 'f') $('btnFlip').click();
    else if (e.key === 'h') $('btnHint').click();
  });
}
function wireSeg(groupId, cb){
  document.querySelectorAll('#' + groupId + ' .seg-btn').forEach(b => {
    b.onclick = () => { setSeg(groupId, b.dataset.val); cb(b.dataset.val); };
  });
}
