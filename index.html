<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f6f5ef">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Chessmate · Chess</title>
<link rel="manifest" href='data:application/json,{"name":"Chessmate","short_name":"Chessmate","display":"standalone","background_color":"%2313151b","theme_color":"%2313151b","start_url":"./","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2720%27 fill=%27%2312141a%27/%3E%3Ctext x=%2750%27 y=%2772%27 font-size=%2764%27 text-anchor=%27middle%27 fill=%27%23c15f3c%27%3E%E2%99%9E%3C/text%3E%3C/svg%3E","sizes":"any","type":"image/svg+xml"}]}'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>try{var r=JSON.parse(localStorage.getItem('chessmate.roster')||'null');if((r&&r.current)||localStorage.getItem('chessmate.name'))document.documentElement.setAttribute('data-named','1');}catch(e){}</script>
<style>
  :root{
    --ink:#f6f5ef; --panel:#ffffff; --panel-2:#f1efe8; --line:#e7e4da;
    --text:#2a2824; --muted:#7d7a70; --gold:#c15f3c; --gold-2:#a94e30; --gold-soft:#f3e5dd;
    --good:#5e8a49; --bad:#c0503f;
    --display:'Fraunces',Georgia,'Times New Roman',serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --body:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --sq-last:rgba(240,196,90,.55); --sq-sel:rgba(240,196,90,.72); --sq-check:rgba(214,84,74,.5);
  }
  /* dark palette (page chrome only — board colours come from data-theme) */
  body[data-palette=dark]{
    --ink:#13151b; --panel:#1c1f27; --panel-2:#262a33; --line:#343a45;
    --text:#ecebe4; --muted:#989ba4; --gold:#d06a44; --gold-2:#e0916f; --gold-soft:#3a2a22;
    --good:#6fa25a; --bad:#d76a5c;
  }
  /* board themes */
  body[data-theme=emerald]{--lt:#ebecd0;--dk:#6f9350;}
  body[data-theme=walnut] {--lt:#eccfa0;--dk:#9c6b3f;}
  body[data-theme=midnight]{--lt:#cfd7e6;--dk:#45566e;}
  body[data-theme=marble] {--lt:#eceaf0;--dk:#9aa0ab;}
  body[data-theme=coral]  {--lt:#ffe1ea;--dk:#e07a9b;}

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--text); font-family:var(--body);
    -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 0;
    overflow-x:hidden;
  }
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}

  /* ---------- header ---------- */
  .top{
    max-width:940px;margin:0 auto;padding:16px 18px 10px;
    display:flex;align-items:center;gap:14px;
  }
  .brand{
    font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:0;
    color:var(--text);line-height:1;
  }
  .brand b{color:var(--gold)}
  .tabs{display:flex;gap:4px;margin-left:6px;background:var(--panel);padding:4px;border-radius:12px;border:1px solid var(--line)}
  .tab{
    padding:7px 15px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted);
    transition:.15s;
  }
  .tab.on{background:var(--gold-soft);color:var(--gold-2)}
  .icon-btn{
    width:40px;height:40px;border-radius:12px;background:var(--panel);
    border:1px solid var(--line);font-size:18px;color:var(--muted);display:grid;place-items:center;transition:.15s;
  }
  #btnPalette{margin-left:auto}
  .icon-btn:hover{color:var(--text);border-color:var(--line-2,var(--muted))}

  /* ---------- layout ---------- */
  .wrap{max-width:560px;margin:0 auto;padding:6px 14px 40px}
  @media(min-width:960px){
    .wrap{max-width:940px;display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start;padding-top:10px}
  }
  .leftcol{min-width:0}

  /* ---------- player cards ---------- */
  .card{
    display:flex;align-items:center;gap:11px;padding:9px 12px;margin:7px 0;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    user-select:none;
  }
  .avatar{
    width:40px;height:40px;border-radius:10px;background:var(--panel-2);
    display:grid;place-items:center;font-size:20px;flex:none;border:1px solid var(--line)
  }
  .who{min-width:0;flex:1}
  .name{font-weight:700;font-size:15px;line-height:1.15}
  .rating{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:1px}
  .tray{display:flex;flex-wrap:wrap;gap:1px;margin-top:3px;min-height:16px}
  .mini{width:15px;height:15px;display:inline-block;opacity:.92}
  .mini svg{width:100%;height:100%;display:block}
  .right{display:flex;align-items:center;gap:10px;flex:none}
  .adv{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--gold-2)}
  .think{font-size:11px;color:var(--muted);font-style:italic;opacity:0;transition:.2s}
  .think.show{opacity:1;animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}
  .clock{
    font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:.5px;
    padding:5px 11px;border-radius:9px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);min-width:74px;text-align:center;transition:.15s
  }
  .clock.run{border-color:var(--gold);color:var(--gold-2);box-shadow:0 0 0 1px var(--gold) inset}

  /* ---------- board ---------- */
  .board-row{display:grid;grid-template-columns:auto auto minmax(0,1fr);grid-template-rows:auto auto;column-gap:6px;row-gap:5px;margin:4px 0 2px}
  .evalwrap{grid-column:1;grid-row:1;display:flex;flex-direction:column;align-items:center;gap:6px;width:20px}
  body[data-eval=off] .evalwrap{display:none}
  .evalbar{position:relative;flex:1;width:11px;border-radius:6px;background:#3a352e;overflow:hidden}
  .eval-fill{position:absolute;left:0;right:0;bottom:0;height:50%;background:linear-gradient(#fbfaf5,#eceadf);transition:height .45s cubic-bezier(.4,0,.2,1)}
  .eval-fill::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
  .eval-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text);writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:.5px}
  .eval-num.neg{color:var(--muted)}

  .ranks{grid-column:2;grid-row:1;display:flex;flex-direction:column}
  .files{grid-column:3;grid-row:2;display:flex}
  .ranks:empty,.files:empty{display:none}
  .ranks .co,.files .co{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted)}
  .files .co{min-height:15px}
  .ranks .co{min-width:13px}

  .frame{
    grid-column:3;grid-row:1;position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;
    box-shadow:0 6px 22px rgba(40,35,25,.12),0 0 0 1px var(--line);
    touch-action:none;user-select:none;-webkit-user-select:none;
  }
  .board{position:absolute;inset:0;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr)}
  .sq{position:relative}
  .sq.light{background:var(--lt)} .sq.dark{background:var(--dk)}
  .sq.last{box-shadow:inset 0 0 0 100px var(--sq-last)}
  .sq.sel{box-shadow:inset 0 0 0 100px var(--sq-sel)}
  .sq.check{box-shadow:inset 0 0 60px 6px var(--sq-check)}
  .sq.dot::after{content:"";position:absolute;inset:0;margin:auto;width:30%;height:30%;border-radius:50%;background:rgba(30,28,24,.22)}
  .sq.dark.dot::after{background:rgba(30,28,24,.3)}
  .sq.cap::after{content:"";position:absolute;inset:6%;border-radius:50%;border:5px solid rgba(30,28,24,.2);box-sizing:border-box}

  .pieces{position:absolute;inset:0;pointer-events:none}
  .pc{
    position:absolute;top:0;left:0;width:12.5%;height:12.5%;
    transition:transform .17s cubic-bezier(.22,.78,.26,1),opacity .16s;
    will-change:transform;
  }
  .pc svg{width:100%;height:100%;display:block;filter:drop-shadow(0 1.5px 1.5px rgba(30,25,15,.22));-webkit-user-drag:none;user-select:none}
  .pc.dragging{transition:none}
  .pc.captured{opacity:0}

  .arrows{position:absolute;inset:0;pointer-events:none;overflow:visible}
  .arrow-line{stroke:var(--gold);stroke-width:1.7;stroke-linecap:round;opacity:.9}
  .arrow-head{fill:var(--gold);opacity:.9}

  /* ---------- controls ---------- */
  .pz-result{font-family:var(--mono);font-size:13px;font-weight:700;min-height:20px;margin:8px 2px 0;text-align:center;color:var(--muted)}
  .pz-result.good{color:var(--good)} .pz-result.bad{color:var(--bad)}
  body:not([data-mode=puzzle]) .pz-result{display:none}

  .controls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .ctrl{
    padding:12px 6px;border-radius:12px;background:var(--panel);border:1px solid var(--line);
    font-size:13.5px;font-weight:600;color:var(--text);transition:.14s
  }
  .ctrl:hover{background:var(--panel-2)}
  .ctrl:active{transform:translateY(1px)}

  .review{display:flex;gap:8px;align-items:center;margin-top:9px}
  .review button{
    flex:1;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);font-size:14px;display:grid;place-items:center;transition:.14s
  }
  .review button:hover{color:var(--text)}
  .review button:active{transform:translateY(1px)}

  .l-puz{display:none}
  body[data-mode=puzzle] .l-play{display:none}
  body[data-mode=puzzle] .l-puz{display:inline}

  /* ---------- move list ---------- */
  .sidecol{margin-top:14px}
  @media(min-width:960px){.sidecol{margin-top:0}}
  .moves-head{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:0 4px 7px}
  .moves{
    background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:8px;
    max-height:220px;overflow-y:auto;font-family:var(--mono);font-size:13.5px;
  }
  @media(min-width:960px){.moves{max-height:min(64vh,560px)}}
  .mrow{display:grid;grid-template-columns:34px 1fr 1fr;gap:4px;align-items:center;padding:2px 0}
  .mno{color:var(--muted);font-size:12px}
  .san{padding:3px 7px;border-radius:6px;cursor:pointer;transition:.12s;white-space:nowrap}
  .san:hover{background:var(--panel-2)}
  .san.on{background:var(--gold);color:#fff;font-weight:700}
  .moves:empty::after{content:"No moves yet";color:var(--muted);font-family:var(--body);font-size:13px;display:block;padding:10px 6px}

  /* ---------- overlays ---------- */
  .banner{position:fixed;inset:0;z-index:60;display:none;place-items:center;background:rgba(42,40,36,.42);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
  .banner.show{display:grid}
  .banner-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 28px;text-align:center;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(40,35,25,.18)}
  .banner-title{font-family:var(--display);font-weight:600;font-size:24px;line-height:1.1}
  .banner-sub{color:var(--muted);font-size:14px;margin-top:7px;font-family:var(--mono)}
  .banner-actions{display:flex;gap:10px;margin-top:20px}
  .banner-actions button{flex:1;padding:12px;border-radius:12px;font-weight:700;font-size:14px}
  .banner-actions .primary{background:var(--gold);color:#fff}
  .banner-actions .ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}

  .promo{position:fixed;inset:0;z-index:70;display:none;background:rgba(42,40,36,.42);padding:20px}
  .promo.show{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
  .promo-pc{width:70px;height:70px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px;transition:.14s}
  .promo-pc:hover{background:var(--panel-2);transform:translateY(-2px)}
  .promo-pc svg{width:100%;height:100%;display:block}
  .promo-cancel{width:44px;height:44px;border-radius:50%;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-size:16px}

  .toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(16px);z-index:80;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:11px 17px;border-radius:12px;font-size:13.5px;opacity:0;pointer-events:none;transition:.24s;box-shadow:0 10px 34px rgba(40,35,25,.16);max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%)}

  /* ---------- settings sheet ---------- */
  .sheet{position:fixed;top:0;right:0;z-index:91;height:100%;width:min(370px,88vw);background:var(--panel);border-left:1px solid var(--line);transform:translateX(101%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-16px 0 50px rgba(40,35,25,.14)}
  .sheet.show{transform:none}
  #settingsBackdrop{position:fixed;inset:0;z-index:90;background:rgba(42,40,36,.35);opacity:0;pointer-events:none;transition:.3s}
  .sheet.show ~ #settingsBackdrop{opacity:1;pointer-events:auto}
  .sheet-head{display:flex;align-items:center;padding:18px 20px 12px}
  .sheet-head h2{font-family:var(--display);font-weight:600;font-size:21px}
  #settingsClose{margin-left:auto;width:34px;height:34px;border-radius:9px;background:var(--panel-2);color:var(--muted);font-size:14px}
  .sheet-body{flex:1;overflow-y:auto;padding:10px 20px 22px}
  .field{margin:20px 0}
  .field:first-child{margin-top:6px}
  .field>label{display:block;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:9px}
  .seg{display:flex;flex-wrap:wrap;gap:7px}
  .seg-btn{flex:1 1 auto;min-width:66px;text-align:center;padding:10px 12px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);transition:.13s}
  .seg-btn:hover{color:var(--text);border-color:var(--gold)}
  .seg-btn.on{background:var(--gold);color:#fff;border-color:transparent}
  .seg-btn.on:hover{color:#fff}
  .seg-strength{flex-direction:column}
  .seg-strength .seg-btn{font-family:var(--mono);font-size:12.5px;text-align:left}
  .seg-strength .seg-two{margin-top:9px;font-family:var(--body);font-size:13px;font-weight:600}
  .toggles{margin-top:6px}
  .tog{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;font-size:14.5px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--line)}
  .tog:last-child{border-bottom:none}
  .tog input{appearance:none;-webkit-appearance:none;width:44px;height:26px;border-radius:14px;background:var(--panel-2);border:1px solid var(--line);position:relative;transition:.2s;cursor:pointer;flex:none}
  .tog input::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.2s}
  .tog input:checked{background:var(--gold)}
  .tog input:checked::after{background:#fff;transform:translateX(18px)}
  .sheet-foot{padding:14px 20px calc(18px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
  #settingsApply{width:100%;padding:14px;border-radius:13px;background:var(--gold);color:#fff;font-weight:700;font-size:15px;transition:.14s}
  #settingsApply:hover{background:var(--gold-2)}

  /* ---------- users + games ---------- */
  .user-pick{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .user-btn{position:relative;display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:13px;background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:15px;font-weight:600;transition:.14s;text-align:left}
  .user-btn:hover{background:var(--panel-2);border-color:var(--gold)}
  .u-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .u-rec{font-family:var(--mono);font-size:11.5px;color:var(--muted);flex:none}
  .u-del{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;color:var(--muted);background:transparent;flex:none}
  .u-del:hover{color:var(--bad);background:rgba(224,100,95,.14)}
  .landing-link{margin-top:16px;background:none;color:var(--muted);font-size:13.5px;text-decoration:underline;padding:6px}
  .landing-link:hover{color:var(--text)}
  .user-actions{display:flex;gap:8px;margin-top:8px}
  .mini-btn{flex:1;padding:10px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:600;transition:.13s}
  .mini-btn:hover{border-color:var(--gold)}
  .games-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
  .game-row{display:flex;align-items:stretch;gap:6px}
  .game-main{flex:1;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);text-align:left;transition:.13s;min-width:0}
  .game-main:hover{border-color:var(--gold)}
  .g-del{flex:none;width:36px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-size:12px;transition:.13s}
  .g-del:hover{color:var(--bad);border-color:var(--bad)}
  .player-field{margin-top:6px}
  .player-line{display:flex;align-items:baseline;gap:11px;min-width:0}
  .player-key{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);flex:none}
  .player-name{font-family:var(--display);font-size:22px;font-weight:600;color:var(--text);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .switch-link{margin-top:6px;font-size:12.5px;font-weight:500;color:var(--muted);text-decoration:underline;text-underline-offset:3px;background:none;padding:2px 0;transition:.13s}
  .switch-link:hover{color:var(--gold)}
  .g-res{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;flex:none}
  .g-res.w{color:var(--good);background:rgba(121,192,106,.14)}
  .g-res.l{color:var(--bad);background:rgba(224,100,95,.14)}
  .g-res.d{color:var(--muted);background:rgba(42,40,36,.07)}
  .g-res.ip{color:var(--gold-2);background:rgba(217,164,65,.16)}
  .g-meta{flex:1;font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex:none}
  .games-empty{color:var(--muted);font-size:13px;padding:8px 2px;line-height:1.5}

  /* narrow screens: tabs drop to their own centered row */
  @media(max-width:520px){
    .top{flex-wrap:wrap;gap:10px 14px}
    .brand{order:1}
    .icon-btn{order:2}
    .tabs{order:3;margin-left:0;width:100%;justify-content:center}
  }

  /* ---------- landing (name gate) ---------- */
  .landing{position:fixed;inset:0;z-index:120;display:flex;align-items:center;justify-content:center;padding:24px;
    background:var(--ink)}
  html[data-named] .landing{display:none}
  .landing.gone{display:none}
  .landing-card{width:100%;max-width:360px;text-align:center}
  .landing-brand{font-family:var(--display);font-weight:600;font-size:48px;letter-spacing:0;line-height:1}
  .landing-brand b{color:var(--gold)}
  .landing-tag{color:var(--muted);font-size:14.5px;margin:12px 0 28px}
  .landing-input{width:100%;padding:15px 16px;border-radius:13px;background:var(--panel);border:1px solid var(--line);
    color:var(--text);font-family:var(--body);font-size:16px;text-align:center;outline:none;transition:.15s}
  .landing-input:focus{border-color:var(--gold)}
  .landing-input::placeholder{color:var(--muted)}
  .landing-btn{width:100%;margin-top:12px;padding:15px;border-radius:13px;background:var(--gold);color:#fff;
    font-weight:700;font-size:15.5px;transition:.14s}
  .landing-btn:hover{background:var(--gold-2)}

/* this function is used to uniquely identify ambiguous moves */
function get_disambiguator(move, moves) {
  var from = move.from
  var to = move.to
  var piece = move.piece

  var ambiguities = 0
  var same_rank = 0
  var same_file = 0

  for (var i = 0, len = moves.length; i < len; i++) {
    var ambig_from = moves[i].from
    var ambig_to = moves[i].to
    var ambig_piece = moves[i].piece

    /* if a move of the same piece type ends on the same to square, we'll
     * need to add a disambiguator to the algebraic notation
     */
    if (piece === ambig_piece && from !== ambig_from && to === ambig_to) {
      ambiguities++

      if (rank(from) === rank(ambig_from)) {
        same_rank++
      }

      if (file(from) === file(ambig_from)) {
        same_file++
      }
    }
  }

  if (ambiguities > 0) {
    /* if there exists a similar moving piece on the same rank and file as
     * the move in question, use the square as the disambiguator
     */
    if (same_rank > 0 && same_file > 0) {
      return algebraic(from)
    } else if (same_file > 0) {
      /* if the moving piece rests on the same file, use the rank symbol as the
       * disambiguator

      return algebraic(from).charAt(1)
    } else {
      /* else use the file symbol */
      return algebraic(from).charAt(0)
    }
  }

    return PAWN

  piece_type = piece_type.toLowerCase()
  if (piece_type === 'o') {

  return piece_type

function rank(i) {

function file(i) {
  return i & 15

  for (var property in obj) {
    if (typeof property === 'object') {
      dupe[property] = clone(obj[property])
    } else {
      dupe[property] = obj[property]

   * starting position

      keep_headers = false

    kings = { w: EMPTY, b: EMPTY }
    turn = WHITE
    castling = { w: 0, b: 0 }
    ep_square = EMPTY

    comments = {}

    var current_comments = {}
    var copy_comment = function (fen) {
      if (fen in comments) {
        current_comments[fen] = comments[fen]
      }
    }
    while (history.length > 0) {
      reversed_history.push(undo_move())
    }
    copy_comment(generate_fen())
    while (reversed_history.length > 0) {
      make_move(reversed_history.pop())
      copy_comment(generate_fen())
    }
    comments = current_comments

        put({ type: piece.toLowerCase(), color: color }, algebraic(square))

    /* 1st criterion: 6 space-seperated fields? */
    var tokens = fen.split(/\s+/)
    if (tokens.length !== 6) {
      return { valid: false, error_number: 1, error: errors[1] }
    }

    /* 2nd criterion: move number field is a integer value > 0? */
    if (isNaN(parseInt(tokens[5])) || parseInt(tokens[5], 10) <= 0) {
      return { valid: false, error_number: 2, error: errors[2] }
    }

    /* 3rd criterion: half move counter is an integer >= 0? */
    if (isNaN(parseInt(tokens[4])) || parseInt(tokens[4], 10) < 0) {
      return { valid: false, error_number: 3, error: errors[3] }
    }

    /* 4th criterion: 4th field is a valid e.p.-string? */
    if (!/^(-|[abcdefgh][36])$/.test(tokens[3])) {
      return { valid: false, error_number: 4, error: errors[4] }
    }

    /* 5th criterion: 3th field is a valid castle-string? */
    if (!/^(KQ?k?q?|Qk?q?|kq?|q|-)$/.test(tokens[2])) {
      return { valid: false, error_number: 5, error: errors[5] }
    }

    /* 6th criterion: 2nd field is "w" (white) or "b" (black)? */
    if (!/^(w|b)$/.test(tokens[1])) {
      return { valid: false, error_number: 6, error: errors[6] }
    }

    /* 7th criterion: 1st field contains 8 rows? */
    var rows = tokens[0].split('/')
    if (rows.length !== 8) {
      return { valid: false, error_number: 7, error: errors[7] }
    }

    /* 8th criterion: every row is valid? */
    for (var i = 0; i < rows.length; i++) {
      /* check for right sum of fields AND not two numbers in succession */
      var sum_fields = 0
      var previous_was_number = false

      for (var k = 0; k < rows[i].length; k++) {
        if (!isNaN(rows[i][k])) {
          if (previous_was_number) {
            return { valid: false, error_number: 8, error: errors[8] }
          }
          sum_fields += parseInt(rows[i][k], 10)
          previous_was_number = true
        } else {
          if (!/^[prnbqkPRNBQK]$/.test(rows[i][k])) {
            return { valid: false, error_number: 9, error: errors[9] }
          }
          sum_fields += 1
          previous_was_number = false
        }
      }
      if (sum_fields !== 8) {
        return { valid: false, error_number: 10, error: errors[10] }
      }
    }

    if (
      (tokens[3][1] == '3' && tokens[1] == 'w') ||
      (tokens[3][1] == '6' && tokens[1] == 'b')
    ) {
      return { valid: false, error_number: 11, error: errors[11] }
    }

    /* everything's okay! */
    return { valid: true, error_number: 0, error: errors[0] }
  }

  function generate_fen() {
    var empty = 0
    var fen = ''

    for (var i = SQUARE_MAP.a8; i <= SQUARE_MAP.h1; i++) {
      if (board[i] == null) {
        empty++
      } else {
        if (empty > 0) {
          fen += empty
          empty = 0
        }
        var color = board[i].color
        var piece = board[i].type

        fen += color === WHITE ? piece.toUpperCase() : piece.toLowerCase()
      }

      if ((i + 1) & 0x88) {
        if (empty > 0) {
          fen += empty
        }

        if (i !== SQUARE_MAP.h1) {
          fen += '/'
        }

        empty = 0
        i += 8
      }
    }

    var cflags = ''
    if (castling[WHITE] & BITS.KSIDE_CASTLE) {
      cflags += 'K'
    }
    if (castling[WHITE] & BITS.QSIDE_CASTLE) {
      cflags += 'Q'
    }
    if (castling[BLACK] & BITS.KSIDE_CASTLE) {
      cflags += 'k'
    }
    if (castling[BLACK] & BITS.QSIDE_CASTLE) {
      cflags += 'q'
    }

    /* do we have an empty castling flag? */
    cflags = cflags || '-'
    var epflags = ep_square === EMPTY ? '-' : algebraic(ep_square)

    return [fen, turn, cflags, epflags, half_moves, move_number].join(' ')
  }

  function set_header(args) {
    for (var i = 0; i < args.length; i += 2) {
      if (typeof args[i] === 'string' && typeof args[i + 1] === 'string') {
        header[args[i]] = args[i + 1]
      }
    }
    return header
  }

  /* called when the initial board setup is changed with put() or remove().
   * modifies the SetUp and FEN properties of the header object.  if the FEN is
   * equal to the default position, the SetUp and FEN are deleted
   * the setup is only updated if history.length is zero, ie moves haven't been
   * made.
   */
  function update_setup(fen) {
    if (history.length > 0) return

    if (fen !== DEFAULT_POSITION) {
      header['SetUp'] = '1'
      header['FEN'] = fen
    } else {
      delete header['SetUp']
      delete header['FEN']
    }
  }

  function get(square) {
    var piece = board[SQUARE_MAP[square]]
    return piece ? { type: piece.type, color: piece.color } : null
  }

  function put(piece, square) {
    /* check for valid piece object */
    if (!('type' in piece && 'color' in piece)) {
      return false
    }

    /* check for piece */
    if (SYMBOLS.indexOf(piece.type.toLowerCase()) === -1) {
      return false
    }

    /* check for valid square */
    if (!(square in SQUARE_MAP)) {
      return false
    }

    var sq = SQUARE_MAP[square]

    /* don't let the user place more than one king */
    if (
      piece.type == KING &&
      !(kings[piece.color] == EMPTY || kings[piece.color] == sq)
    ) {
      return false
    }

    board[sq] = { type: piece.type, color: piece.color }
    if (piece.type === KING) {
      kings[piece.color] = sq
    }

    update_setup(generate_fen())

    return true
  }

  function remove(square) {
    var piece = get(square)
    board[SQUARE_MAP[square]] = null
    if (piece && piece.type === KING) {
      kings[piece.color] = EMPTY
    }

    update_setup(generate_fen())

    return piece
  }

  function build_move(board, from, to, flags, promotion) {
    var move = {
      color: turn,
      from: from,
      to: to,
      flags: flags,
      piece: board[from].type,
    }

    if (promotion) {
      move.flags |= BITS.PROMOTION
      move.promotion = promotion
    }

    if (board[to]) {
      move.captured = board[to].type
    } else if (flags & BITS.EP_CAPTURE) {
      move.captured = PAWN
    }
    return move
  }

  function generate_moves(options) {
    function add_move(board, moves, from, to, flags) {
      /* if pawn promotion */
      if (
        board[from].type === PAWN &&
        (rank(to) === RANK_8 || rank(to) === RANK_1)
      ) {
        var pieces = [QUEEN, ROOK, BISHOP, KNIGHT]
        for (var i = 0, len = pieces.length; i < len; i++) {
          moves.push(build_move(board, from, to, flags, pieces[i]))
        }
      } else {
        moves.push(build_move(board, from, to, flags))
      }
    }

    var moves = []
    var us = turn
    var them = swap_color(us)
    var second_rank = { b: RANK_7, w: RANK_2 }

    var first_sq = SQUARE_MAP.a8
    var last_sq = SQUARE_MAP.h1
    var single_square = false

    /* do we want legal moves? */
    var legal =
      typeof options !== 'undefined' && 'legal' in options
        ? options.legal
        : true

    var piece_type =
      typeof options !== 'undefined' &&
      'piece' in options &&
      typeof options.piece === 'string'
        ? options.piece.toLowerCase()
        : true

    /* are we generating moves for a single square? */
    if (typeof options !== 'undefined' && 'square' in options) {
      if (options.square in SQUARE_MAP) {
        first_sq = last_sq = SQUARE_MAP[options.square]
        single_square = true
      } else {
        /* invalid square */
        return []
      }
    }

    for (var i = first_sq; i <= last_sq; i++) {
      /* did we run off the end of the board */
      if (i & 0x88) {
        i += 7
        continue
      }

      var piece = board[i]
      if (piece == null || piece.color !== us) {
        continue
      }

      if (piece.type === PAWN && (piece_type === true || piece_type === PAWN)) {
        /* single square, non-capturing */
        var square = i + PAWN_OFFSETS[us][0]
        if (board[square] == null) {
          add_move(board, moves, i, square, BITS.NORMAL)

          /* double square */
          var square = i + PAWN_OFFSETS[us][1]
          if (second_rank[us] === rank(i) && board[square] == null) {
            add_move(board, moves, i, square, BITS.BIG_PAWN)
          }
        }

        /* pawn captures */
        for (j = 2; j < 4; j++) {
          var square = i + PAWN_OFFSETS[us][j]
          if (square & 0x88) continue

          if (board[square] != null && board[square].color === them) {
            add_move(board, moves, i, square, BITS.CAPTURE)
          } else if (square === ep_square) {
            add_move(board, moves, i, ep_square, BITS.EP_CAPTURE)
          }
        }
      } else if (piece_type === true || piece_type === piece.type) {
        for (var j = 0, len = PIECE_OFFSETS[piece.type].length; j < len; j++) {
          var offset = PIECE_OFFSETS[piece.type][j]
          var square = i

          while (true) {
            square += offset
            if (square & 0x88) break

            if (board[square] == null) {
              add_move(board, moves, i, square, BITS.NORMAL)
            } else {
              if (board[square].color === us) break
              add_move(board, moves, i, square, BITS.CAPTURE)
              break
            }

            /* break, if knight or king */
            if (piece.type === 'n' || piece.type === 'k') break
          }
        }
      }
    }

    /* check for castling if: a) we're generating all moves, or b) we're doing
     * single square move generation on the king's square
     */
    if (piece_type === true || piece_type === KING) {
      if (!single_square || last_sq === kings[us]) {
        /* king-side castling */
        if (castling[us] & BITS.KSIDE_CASTLE) {
          var castling_from = kings[us]
          var castling_to = castling_from + 2

          if (
            board[castling_from + 1] == null &&
            board[castling_to] == null &&
            !attacked(them, kings[us]) &&
            !attacked(them, castling_from + 1) &&
            !attacked(them, castling_to)
          ) {
            add_move(board, moves, kings[us], castling_to, BITS.KSIDE_CASTLE)
          }
        }

        /* queen-side castling */
        if (castling[us] & BITS.QSIDE_CASTLE) {
          var castling_from = kings[us]
          var castling_to = castling_from - 2

          if (
            board[castling_from - 1] == null &&
            board[castling_from - 2] == null &&
            board[castling_from - 3] == null &&
            !attacked(them, kings[us]) &&
            !attacked(them, castling_from - 1) &&
            !attacked(them, castling_to)
          ) {
            add_move(board, moves, kings[us], castling_to, BITS.QSIDE_CASTLE)
          }
        }
      }
    }

    /* return all pseudo-legal moves (this includes moves that allow the king
     * to be captured)
     */
    if (!legal) {
      return moves
    }

    /* filter out illegal moves */
    var legal_moves = []
    for (var i = 0, len = moves.length; i < len; i++) {
      make_move(moves[i])
      if (!king_attacked(us)) {
        legal_moves.push(moves[i])
      }
      undo_move()
    }

    return legal_moves
  }

  /* convert a move from 0x88 coordinates to Standard Algebraic Notation
   * (SAN)
   *
   * @param {boolean} sloppy Use the sloppy SAN generator to work around over
   * disambiguation bugs in Fritz and Chessbase.  See below:
   *
   * r1bqkbnr/ppp2ppp/2n5/1B1pP3/4P3/8/PPPP2PP/RNBQK1NR b KQkq - 2 4
   * 4. ... Nge7 is overly disambiguated because the knight on c6 is pinned
   * 4. ... Ne7 is technically the valid SAN
   */
  function move_to_san(move, moves) {
    var output = ''

    if (move.flags & BITS.KSIDE_CASTLE) {
      output = 'O-O'
    } else if (move.flags & BITS.QSIDE_CASTLE) {
      output = 'O-O-O'
    } else {
      if (move.piece !== PAWN) {
        var disambiguator = get_disambiguator(move, moves)
        output += move.piece.toUpperCase() + disambiguator
      }

      if (move.flags & (BITS.CAPTURE | BITS.EP_CAPTURE)) {
        if (move.piece === PAWN) {
          output += algebraic(move.from)[0]
        }
        output += 'x'
      }

      output += algebraic(move.to)

      if (move.flags & BITS.PROMOTION) {
        output += '=' + move.promotion.toUpperCase()
      }
    }

    make_move(move)
    if (in_check()) {
      if (in_checkmate()) {
        output += '#'
      } else {
        output += '+'
      }
    }
    undo_move()

    return output
  }

  function attacked(color, square) {
    for (var i = SQUARE_MAP.a8; i <= SQUARE_MAP.h1; i++) {
      /* did we run off the end of the board */
      if (i & 0x88) {
        i += 7
        continue
      }

      /* if empty square or wrong color */
      if (board[i] == null || board[i].color !== color) continue

      var piece = board[i]
      var difference = i - square
      var index = difference + 119

      if (ATTACKS[index] & (1 << SHIFTS[piece.type])) {
        if (piece.type === PAWN) {
          if (difference > 0) {
            if (piece.color === WHITE) return true
          } else {
            if (piece.color === BLACK) return true
          }
          continue
        }

        /* if the piece is a knight or a king */
        if (piece.type === 'n' || piece.type === 'k') return true

        var offset = RAYS[index]
        var j = i + offset

        var blocked = false
        while (j !== square) {
          if (board[j] != null) {
            blocked = true
            break
          }
          j += offset
        }

        if (!blocked) return true
      }
    }

    return false
  }

  function king_attacked(color) {
    return attacked(swap_color(color), kings[color])
  }

  function in_check() {
    return king_attacked(turn)
  }

  function in_checkmate() {
    return in_check() && generate_moves().length === 0
  }

  function in_stalemate() {
    return !in_check() && generate_moves().length === 0
  }

  function insufficient_material() {
    var pieces = {}
    var bishops = []
    var num_pieces = 0
    var sq_color = 0

    for (var i = SQUARE_MAP.a8; i <= SQUARE_MAP.h1; i++) {
      sq_color = (sq_color + 1) % 2
      if (i & 0x88) {
        i += 7
        continue
      }

      var piece = board[i]
      if (piece) {
        pieces[piece.type] = piece.type in pieces ? pieces[piece.type] + 1 : 1
        if (piece.type === BISHOP) {
          bishops.push(sq_color)
        }
        num_pieces++
      }
    }

    /* k vs. k */
    if (num_pieces === 2) {
      return true
    } else if (
      /* k vs. kn .... or .... k vs. kb */
      num_pieces === 3 &&
      (pieces[BISHOP] === 1 || pieces[KNIGHT] === 1)
    ) {
      return true
    } else if (num_pieces === pieces[BISHOP] + 2) {
      /* kb vs. kb where any number of bishops are all on the same color */
      var sum = 0
      var len = bishops.length
      for (var i = 0; i < len; i++) {
        sum += bishops[i]
      }
      if (sum === 0 || sum === len) {
        return true
      }
    }

    return false
  }

  function in_threefold_repetition() {
    /* TODO: while this function is fine for casual use, a better
     * implementation would use a Zobrist key (instead of FEN). the
     * Zobrist key would be maintained in the make_move/undo_move functions,
     * avoiding the costly that we do below.
     */
    var moves = []
    var positions = {}
    var repetition = false

    while (true) {
      var move = undo_move()
      if (!move) break
      moves.push(move)
    }

    while (true) {
      /* remove the last two fields in the FEN string, they're not needed
       * when checking for draw by rep */
      var fen = generate_fen().split(' ').slice(0, 4).join(' ')

      /* has the position occurred three or move times */
      positions[fen] = fen in positions ? positions[fen] + 1 : 1
      if (positions[fen] >= 3) {
        repetition = true
      }

      if (!moves.length) {
        break
      }
      make_move(moves.pop())
    }

    return repetition
  }

  function push(move) {
    history.push({
      move: move,
      kings: { b: kings.b, w: kings.w },
      turn: turn,
      castling: { b: castling.b, w: castling.w },
      ep_square: ep_square,
      half_moves: half_moves,
      move_number: move_number,
    })
  }

  function make_move(move) {
    var us = turn
    var them = swap_color(us)
    push(move)

    board[move.to] = board[move.from]
    board[move.from] = null

    /* if ep capture, remove the captured pawn */
    if (move.flags & BITS.EP_CAPTURE) {
      if (turn === BLACK) {
        board[move.to - 16] = null
      } else {
        board[move.to + 16] = null
      }
    }

    /* if pawn promotion, replace with new piece */
    if (move.flags & BITS.PROMOTION) {
      board[move.to] = { type: move.promotion, color: us }
    }

    /* if we moved the king */
    if (board[move.to].type === KING) {
      kings[board[move.to].color] = move.to

      /* if we castled, move the rook next to the king */
      if (move.flags & BITS.KSIDE_CASTLE) {
        var castling_to = move.to - 1
        var castling_from = move.to + 1
        board[castling_to] = board[castling_from]
        board[castling_from] = null
      } else if (move.flags & BITS.QSIDE_CASTLE) {
        var castling_to = move.to + 1
        var castling_from = move.to - 2
        board[castling_to] = board[castling_from]
        board[castling_from] = null
      }

      /* turn off castling */
      castling[us] = ''
    }

    /* turn off castling if we move a rook */
    if (castling[us]) {
      for (var i = 0, len = ROOKS[us].length; i < len; i++) {
        if (
          move.from === ROOKS[us][i].square &&
          castling[us] & ROOKS[us][i].flag
        ) {
          castling[us] ^= ROOKS[us][i].flag
          break
        }
      }
    }

    /* turn off castling if we capture a rook */
    if (castling[them]) {
      for (var i = 0, len = ROOKS[them].length; i < len; i++) {
        if (
          move.to === ROOKS[them][i].square &&
          castling[them] & ROOKS[them][i].flag
        ) {
          castling[them] ^= ROOKS[them][i].flag
          break
        }
      }
    }

    /* if big pawn move, update the en passant square */
    if (move.flags & BITS.BIG_PAWN) {
      if (turn === 'b') {
        ep_square = move.to - 16
      } else {
        ep_square = move.to + 16
      }
    } else {
      ep_square = EMPTY
    }

    /* reset the 50 move counter if a pawn is moved or a piece is captured */
    if (move.piece === PAWN) {
      half_moves = 0
    } else if (move.flags & (BITS.CAPTURE | BITS.EP_CAPTURE)) {
      half_moves = 0
    } else {
      half_moves++
    }

    if (turn === BLACK) {
      move_number++
    }
    turn = swap_color(turn)
  }

  function undo_move() {
    var old = history.pop()
    if (old == null) {
      return null
    }

    var move = old.move
    kings = old.kings
    turn = old.turn
    castling = old.castling
    ep_square = old.ep_square
    half_moves = old.half_moves
    move_number = old.move_number

    var us = turn
    var them = swap_color(turn)

    board[move.from] = board[move.to]
    board[move.from].type = move.piece // to undo any promotions
    board[move.to] = null

    if (move.flags & BITS.CAPTURE) {
      board[move.to] = { type: move.captured, color: them }
    } else if (move.flags & BITS.EP_CAPTURE) {
      var index
      if (us === BLACK) {
        index = move.to - 16
      } else {
        index = move.to + 16
      }
      board[index] = { type: PAWN, color: them }
    }

    if (move.flags & (BITS.KSIDE_CASTLE | BITS.QSIDE_CASTLE)) {
      var castling_to, castling_from
      if (move.flags & BITS.KSIDE_CASTLE) {
        castling_to = move.to + 1
        castling_from = move.to - 1
      } else if (move.flags & BITS.QSIDE_CASTLE) {
        castling_to = move.to - 2
        castling_from = move.to + 1
      }

      board[castling_to] = board[castling_from]
      board[castling_from] = null
    }

    return move
  }

  // convert a move from Standard Algebraic Notation (SAN) to 0x88 coordinates
  function move_from_san(move, sloppy) {
    // strip off any move decorations: e.g Nf3+?! becomes Nf3
    var clean_move = stripped_san(move)

    // the move parsers is a 2-step state
    for (var parser = 0; parser < 2; parser++) {
      if (parser == PARSER_SLOPPY) {
        // only run the sloppy parse if explicitly requested
        if (!sloppy) {
          return null
        }

        // The sloppy parser allows the user to parse non-standard chess
        // notations. This parser is opt-in (by specifying the
        // '{ sloppy: true }' setting) and is only run after the Standard
        // Algebraic Notation (SAN) parser has failed.
        //
        // When running the sloppy parser, we'll run a regex to grab the piece,
        // the to/from square, and an optional promotion piece. This regex will
        // parse common non-standard notation like: Pe2-e4, Rc1c4, Qf3xf7,
        // f7f8q, b1c3

        // NOTE: Some positions and moves may be ambiguous when using the
        // sloppy parser. For example, in this position:
        // 6k1/8/8/B7/8/8/8/BN4K1 w - - 0 1, the move b1c3 may be interpreted
        // as Nc3 or B1c3 (a disambiguated bishop move). In these cases, the
        // sloppy parser will default to the most most basic interpretation
        // (which is b1c3 parsing to Nc3).

        // FIXME: these var's are hoisted into function scope, this will need
        // to change when switching to const/let

        var overly_disambiguated = false

        var matches = clean_move.match(
          /([pnbrqkPNBRQK])?([a-h][1-8])x?-?([a-h][1-8])([qrbnQRBN])?/
        )
        if (matches) {
          var piece = matches[1]
          var from = matches[2]
          var to = matches[3]
          var promotion = matches[4]

          if (from.length == 1) {
            overly_disambiguated = true
          }
        } else {
          // The [a-h]?[1-8]? portion of the regex below handles moves that may
          // be overly disambiguated (e.g. Nge7 is unnecessary and non-standard
          // when there is one legal knight move to e7). In this case, the value
          // of 'from' variable will be a rank or file, not a square.
          var matches = clean_move.match(
            /([pnbrqkPNBRQK])?([a-h]?[1-8]?)x?-?([a-h][1-8])([qrbnQRBN])?/
          )

          if (matches) {
            var piece = matches[1]
            var from = matches[2]
            var to = matches[3]
            var promotion = matches[4]

            if (from.length == 1) {
              var overly_disambiguated = true
            }
          }
        }
      }

      var piece_type = infer_piece_type(clean_move)
      var moves = generate_moves({
        legal: true,

const uid = () => 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function loadUserData(id){ try { return { record:{w:0,l:0,d:0}, games:[], live:null, ...JSON.parse(localStorage.getItem('chessmate.u_' + id) || '{}') }; } catch { return { record:{w:0,l:0,d:0}, games:[], live:null }; } }
function saveUserData(id, d){ try { localStorage.setItem('chessmate.u_' + id, JSON.stringify(d)); } catch {} }

let roster = loadRoster();
(function migrateUsers(){
  if (roster && Array.isArray(roster.users) && roster.users.length) return;
  roster = { current: null, users: [] };
  let legacyName = ''; try { legacyName = localStorage.getItem('chessmate.name') || ''; } catch {}
  if (legacyName){
    const id = uid();
    let rec = { w:0, l:0, d:0 }; try { rec = { w:0, l:0, d:0, ...JSON.parse(localStorage.getItem('chessmate.record') || '{}') }; } catch {}
    let live = null; try { live = JSON.parse(localStorage.getItem('chessmate.lastgame') || 'null'); } catch {}
    roster.users.push({ id, name: legacyName });
    roster.current = id;
    saveUserData(id, { record: rec, games: [], live });
    saveRoster();
    try { localStorage.removeItem('chessmate.name'); localStorage.removeItem('chessmate.record'); localStorage.removeItem('chessmate.lastgame'); } catch {}
  } else {
    saveRoster();
  }
})();

let CUR = roster.current || null;
let NAME = '';
let record = { w: 0, l: 0, d: 0 };
let games = [];
let liveGame = null;
let counted = false;   // guard so each finished game is recorded once

function loadCurrentUser(){
  if (!CUR){ NAME=''; record={w:0,l:0,d:0}; games=[]; liveGame=null; return; }
  const d = loadUserData(CUR);
  record = d.record || { w:0, l:0, d:0 };
  games = d.games || [];
  liveGame = d.live || null;
  const u = roster.users.find(x => x.id === CUR);
  NAME = u ? u.name : '';
}
function saveCurrentUser(){ if (CUR) saveUserData(CUR, { record, games, live: liveGame }); }
function createUser(name){
  const id = uid();
  roster.users.push({ id, name: ((name || 'Player').trim().slice(0, 20)) || 'Player' });
  roster.current = id; CUR = id;
  saveUserData(id, { record:{w:0,l:0,d:0}, games:[], live:null });
  saveRoster(); loadCurrentUser();
  return id;
}
function switchUser(id){
  if (!roster.users.find(u => u.id === id)) return;
  roster.current = id; CUR = id; saveRoster(); loadCurrentUser();
}
function renameCurrentUser(name){
  const u = roster.users.find(x => x.id === CUR);
  if (u){ u.name = (name || '').trim().slice(0, 20); NAME = u.name; saveRoster(); }
}
function deleteUser(id){
  const i = roster.users.findIndex(u => u.id === id);
  if (i < 0) return;
  roster.users.splice(i, 1); removeUserData(id);
  if (CUR === id){ CUR = roster.users[0] ? roster.users[0].id : null; roster.current = CUR; }
  saveRoster(); loadCurrentUser();
}
loadCurrentUser();

function recordStr(){ return record.w + 'W ' + record.l + 'L ' + record.d + 'D'; }
function updateRecordUI(){ if (mode === 'play' && S.strength !== 'two') meRating.textContent = playerLabel(); }

/* record a finished play game once: update W/L/D + archive it, clear the live game */
function concludeGame(kind, reason){
  gameOver = true;
  if (mode !== 'play' || !CUR || counted) return;
  counted = true;
  if (kind === 'win') record.w++; else if (kind === 'loss') record.l++; else record.d++;
  const g = { moves: game.history(), youAre: S.resolvedYou, orientation, strength: S.strength,
              time: S.time, over: true, result: kind, reason, opp: (BOTS[S.strength] && BOTS[S.strength].name) || 'bot', ts: Date.now() };
  if (g.moves.length){ games.unshift(g); if (games.length > 50) games.length = 50; }
  liveGame = null;
  saveCurrentUser(); updateRecordUI();
}

/* cache the in-progress play game so it can resume on reload / mode-switch */
function persistGame(){
  if (mode !== 'play' || !CUR) return;
  liveGame = {
    moves: game.history(), youAre: S.resolvedYou, orientation, strength: S.strength, time: S.time,
    cw: clock.on ? clock.w : null, cb: clock.on ? clock.b : null,
    over: gameOver, ts: Date.now(),
  };
  saveCurrentUser();
}

const EVAL_DEPTH = 12;   // honest evaluation depth for the bar/hints

/* ==========================================================================
   ENGINE WRAPPER (Stockfish worker, serialized searches)
   ========================================================================== */
const Engine = (() => {
  let worker = null, ready = false, booting = null;
  let chain = Promise.resolve();     // serialize go-commands
  const listeners = new Set();

  function onLine(line){ listeners.forEach(fn => fn(line)); }

  function makeWorker(){
    const url = 'https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js';
    try { return new Worker(url); }
    catch (e) {
      // Fallback: run a tiny worker that imports the CDN script (cross-origin importScripts is allowed)
      const blob = new Blob([`importScripts(${JSON.stringify(url)});`], { type: 'application/javascript' });
      return new Worker(URL.createObjectURL(blob));
    }
  }

  function boot(){
    if (booting) return booting;
    booting = new Promise((resolve, reject) => {
      let settled = false;
      try { worker = makeWorker(); }
      catch (e) { reject(e); return; }
      worker.onmessage = (ev) => {
        const line = typeof ev.data === 'string' ? ev.data : (ev.data && ev.data.data) || '';
        onLine(line);
        if (!settled && line === 'uciok') { send('isready'); }
        if (!settled && line === 'readyok') { settled = true; ready = true; resolve(true); }
      };
      worker.onerror = (e) => { if (!settled) reject(e); };
      send('uci');
      setTimeout(() => { if (!settled) reject(new Error('engine timeout')); }, 12000);
    });
    return booting;
  }

  function send(cmd){ if (worker) worker.postMessage(cmd); }

  // Run one search. opts: {fen, movetime, depth, skill}. Resolves {best, cp, mate}.
  function search(opts){
    const run = () => new Promise((resolve) => {
      let cp = null, mate = null, best = null;
      const handler = (line) => {
        if (line.startsWith('info')){
          const mCp = line.match(/score cp (-?\d+)/);
          const mMate = line.match(/score mate (-?\d+)/);
          if (mCp) { cp = parseInt(mCp[1], 10); mate = null; }
          if (mMate) { mate = parseInt(mMate[1], 10); cp = null; }
        } else if (line.startsWith('bestmove')){
          best = line.split(' ')[1];
          listeners.delete(handler);
          resolve({ best: (best && best !== '(none)') ? best : null, cp, mate });
        }
      };
      listeners.add(handler);
      if (typeof opts.skill === 'number') send('setoption name Skill Level value ' + opts.skill);
      send('position fen ' + opts.fen);
      if (opts.movetime) send('go movetime ' + opts.movetime + (opts.depth ? ' depth ' + opts.depth : ''));
      else send('go depth ' + (opts.depth || EVAL_DEPTH));
      // safety timeout
      setTimeout(() => { if (listeners.has(handler)) { listeners.delete(handler); resolve({ best, cp, mate }); } }, 20000);
    });
    chain = chain.then(run, run);
    return chain;
  }

  return {
    async init(){ return boot(); },
    get ready(){ return ready; },
    search,
    stop(){ send('stop'); },
    newGame(){ send('ucinewgame'); },
  };
})();

function sqToXY(square){
  const file = square.charCodeAt(0) - 97;
  const rank = parseInt(square[1], 10);
  let col, row;
  if (orientation === 'w'){ col = file; row = 8 - rank; }
  else { col = 7 - file; row = rank - 1; }
  return { col, row };
}
function xyToSq(col, row){
  let file, rank;
  if (orientation === 'w'){ file = col; rank = 8 - row; }
  else { file = 7 - col; rank = row + 1; }
  return FILES[file] + rank;
}
function pointToSq(clientX, clientY){
  const r = boardEl.getBoundingClientRect();
  let col = Math.floor((clientX - r.left) / r.width * 8);
  let row = Math.floor((clientY - r.top) / r.height * 8);
  col = clamp(col, 0, 7); row = clamp(row, 0, 7);
  return xyToSq(col, row);
}

/* ==========================================================================
   RENDERING
   ========================================================================== */
let boardEl, pieceLayer, ranksEl, filesEl, squaresById = new Map();

function buildSquares(){
  boardEl.innerHTML = '';
  squaresById.clear();
  for (let row = 0; row < 8; row++){
    for (let col = 0; col < 8; col++){
      const s = xyToSq(col, row);
      const isLight = (col + row) % 2 === 0;
      const d = el('div', 'sq ' + (isLight ? 'light' : 'dark'));
      d.dataset.sq = s;
      squaresById.set(s, d);
      boardEl.appendChild(d);
    }
  }
  buildLabels();
}

/* Rank numbers (left gutter) and file letters (bottom gutter) sit OUTSIDE the
   board, aligned to rows/columns and flipping with orientation. */
function buildLabels(){
  if (!ranksEl || !filesEl) return;
  ranksEl.innerHTML = ''; filesEl.innerHTML = '';
  if (!S.coords) return;
  for (let i = 0; i < 8; i++){
    const rank = orientation === 'w' ? (8 - i) : (i + 1);
    ranksEl.appendChild(el('span', 'co', rank));
    const file = orientation === 'w' ? FILES[i] : FILES[7 - i];
    filesEl.appendChild(el('span', 'co', file));
  }
}

function makePieceEl(pieceKey, square){
  const p = el('div', 'pc');
  p.innerHTML = PIECE_SVG[pieceKey];
  p.dataset.piece = pieceKey;
  const { col, row } = sqToXY(square);
  p.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
  return p;
}

function renderPosition(){
  // full rebuild (snap, no animation) — used for new game/undo/load/review/puzzle
  pieceLayer.innerHTML = '';
  sqEl.clear();
  const src = (viewPly != null) ? positionAtPly(viewPly) : game;
  const b = src.board(); // rank8..rank1
  for (let r = 0; r < 8; r++){
    for (let c = 0; c < 8; c++){
      const cell = b[r][c];
      if (!cell) continue;
      const square = FILES[c] + (8 - r);
      const key = cell.color + cell.type.toUpperCase();
      const p = makePieceEl(key, square);
      pieceLayer.appendChild(p);
      sqEl.set(square, p);
    }
  }
  refreshHighlights();
}

function positionAtPly(ply){
  const g = new Chess();
  const hist = game.history();
  for (let i = 0; i < ply; i++) g.move(hist[i]);
  return g;
}

function animateMove(m){
  // incremental DOM update for a single live move object from chess.js
  const rookMoves = {
    k: { w: ['h1','f1'], b: ['h8','f8'] },
    q: { w: ['a1','d1'], b: ['a8','d8'] },
  };
  // captured piece
  if (m.flags.includes('e')){
    const capSq = m.to[0] + m.from[1];
    fadeRemove(capSq);
  } else if (m.captured){
    fadeRemove(m.to);
  }
  // move the piece element
  const pieceElm = sqEl.get(m.from);
  if (pieceElm){
    sqEl.delete(m.from);
    const prev = sqEl.get(m.to);
    if (prev && prev !== pieceElm) prev.remove();
    const { col, row } = sqToXY(m.to);
    pieceElm.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
    sqEl.set(m.to, pieceElm);
    if (m.flags.includes('p')){
      pieceElm.innerHTML = PIECE_SVG[m.color + m.promotion.toUpperCase()];
      pieceElm.dataset.piece = m.color + m.promotion.toUpperCase();
    }
  } else {
    renderPosition();
  }
  // castling rook
  if (m.flags.includes('k') || m.flags.includes('q')){
    const side = m.flags.includes('k') ? 'k' : 'q';
    const [rf, rt] = rookMoves[side][m.color];
    const rEl = sqEl.get(rf);
    if (rEl){
      sqEl.delete(rf);
      const { col, row } = sqToXY(rt);
      rEl.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
      sqEl.set(rt, rEl);
    }
  }
  refreshHighlights();
}

function fadeRemove(square){
  const p = sqEl.get(square);
  if (p){ sqEl.delete(square); p.classList.add('captured'); setTimeout(() => p.remove(), 180); }
}

function refreshHighlights(){
  squaresById.forEach((d) => d.classList.remove('sel','last','check','dot','cap'));
  const src = (viewPly != null) ? positionAtPly(viewPly) : game;
  if (lastMove && viewPly == null){
    squaresById.get(lastMove.from)?.classList.add('last');
    squaresById.get(lastMove.to)?.classList.add('last');
  }
  if (selected){
    squaresById.get(selected)?.classList.add('sel');
    if (S.showMoves){
      legalTargets.forEach(t => {
        const d = squaresById.get(t.to);
        if (!d) return;
        d.classList.add(t.captured || t.flags.includes('e') ? 'cap' : 'dot');
      });
    }
  }
  if (src.in_check()){
    const kSq = findKing(src, src.turn());
    if (kSq) squaresById.get(kSq)?.classList.add('check');
  }
  drawArrow();
}

function findKing(g, color){
  const b = g.board();
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++){
    const cell = b[r][c];
    if (cell && cell.type === 'k' && cell.color === color) return FILES[c] + (8 - r);
  }
  return null;
}

/* ---------- hint arrow ---------- */
let arrowSvg;
function drawArrow(){
  arrowSvg.innerHTML = '';
  if (!hintMove) return;
  const c = (sq) => { const { col, row } = sqToXY(sq); return { x: col * 12.5 + 6.25, y: row * 12.5 + 6.25 }; };
  const a = c(hintMove.from), b = c(hintMove.to);
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  const shrink = 4.2; // pull head back so it sits inside the square
  const bx = b.x - Math.cos(ang) * shrink, by = b.y - Math.sin(ang) * shrink;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
  line.setAttribute('x2', bx); line.setAttribute('y2', by);
  line.setAttribute('class', 'arrow-line');
  arrowSvg.appendChild(line);
  const size = 3.4;
  const hx = b.x, hy = b.y;
  const left = `${hx - Math.cos(ang - 0.5) * size},${hy - Math.sin(ang - 0.5) * size}`;
  const right = `${hx - Math.cos(ang + 0.5) * size},${hy - Math.sin(ang + 0.5) * size}`;
  const head = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  head.setAttribute('points', `${hx},${hy} ${left} ${right}`);
  head.setAttribute('class', 'arrow-head');
  arrowSvg.appendChild(head);
}

/* ==========================================================================
   SOUND (WebAudio, synthesized — no assets, offline-friendly)
   ========================================================================== */
const Sound = (() => {
  let ctx = null;
  const ensure = () => { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} } return ctx; };
  function thock(freq, dur, type = 'sine', gain = 0.18){
    if (!S.sound) return; const ac = ensure(); if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g).connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  }
  function noiseHit(gain = 0.22, dur = 0.06){
    if (!S.sound) return; const ac = ensure(); if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    const n = ac.sampleRate * dur, buf = ac.createBuffer(1, n, ac.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const g = ac.createGain(); g.gain.value = gain;
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
    src.connect(f).connect(g).connect(ac.destination); src.start();
  }
  return {
    move(){ noiseHit(0.16, 0.05); thock(210, 0.07, 'triangle', 0.10); },
    capture(){ noiseHit(0.28, 0.07); thock(130, 0.09, 'sawtooth', 0.10); },
    check(){ thock(880, 0.09, 'square', 0.10); setTimeout(() => thock(1180, 0.09, 'square', 0.09), 70); },
    castle(){ noiseHit(0.14, 0.05); setTimeout(() => noiseHit(0.14, 0.05), 90); },
    promote(){ thock(660, 0.10, 'sine', 0.12); setTimeout(() => thock(990, 0.12, 'sine', 0.12), 90); },
    end(){ [523, 659, 784].forEach((f, i) => setTimeout(() => thock(f, 0.35, 'sine', 0.10), i * 90)); },
    win(){ [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => thock(f, 0.3, 'sine', 0.11), i * 80)); },
    prime(){ ensure(); },
  };
})();

function soundForMove(m){
  if (m.flags.includes('k') || m.flags.includes('q')) Sound.castle();
  else if (m.flags.includes('p')) Sound.promote();
  else if (m.captured || m.flags.includes('e')) Sound.capture();
  else Sound.move();
  if (game.in_check()) setTimeout(() => Sound.check(), 40);
}

/* ==========================================================================
   MOVE FLOW
   ========================================================================== */
function userControlsSide(color){
  if (mode === 'analysis') return true;
  if (mode === 'puzzle') return color === pz.sideToMove && pz.solving && !pz.solved;
  if (S.strength === 'two') return true; // 2-player pass-and-play
  return color === S.resolvedYou; // play vs bot
}

function onSquareActivate(square){
  if (viewPly != null){ goLive(); }
  if (thinking || gameOver) { if (mode !== 'analysis') return; }
  const turn = game.turn();
  const piece = game.get(square);

  if (selected){
    // attempt move to this square
    const target = legalTargets.find(t => t.to === square);
    if (target){ commitUserMove(selected, square); return; }
  }
  // (re)select own piece
  if (piece && piece.color === turn && userControlsSide(turn)){
    selected = square;
    legalTargets = game.moves({ square, verbose: true });
    refreshHighlights();
  } else {
    selected = null; legalTargets = [];
    refreshHighlights();
  }
}

function needsPromotion(from, to){
  const p = game.get(from);
  if (!p || p.type !== 'p') return false;
  return (p.color === 'w' && to[1] === '8') || (p.color === 'b' && to[1] === '1');
}

function commitUserMove(from, to){
  if (needsPromotion(from, to)){
    askPromotion(game.turn(), (choice) => doMove({ from, to, promotion: choice }));
  } else {
    doMove({ from, to, promotion: 'q' });
  }
}

function doMove(mv, opts = {}){
  const m = game.move(mv);
  if (!m) return false;
  selected = null; legalTargets = []; hintMove = null;
  lastMove = { from: m.from, to: m.to };
  posId++;
  if (opts.snap) renderPosition(); else if (S.animate) animateMove(m); else renderPosition();
  if (!opts.silent) soundForMove(m);
  onClockMove(m.color);
  renderMoveList();
  afterPositionChange();
  return m;
}

function afterPositionChange(){
  // game end?
  if (game.game_over()){ endGame(); return; }
  if (mode === 'play'){
    persistGame();
    if (!userControlsSide(game.turn())) { scheduleEngineMove(); }
    else { refreshEval(); }
  } else if (mode === 'analysis'){
    refreshEval();
  } else if (mode === 'puzzle'){
    handlePuzzleProgress();
  }
}

async function scheduleEngineMove(){
  if (!Engine.ready){ setThinking(true, 'loading engine…'); try { await Engine.init(); } catch { setThinking(false); toast('Engine unavailable — check connection.'); return; } }
  const bot = BOTS[S.strength];
  setThinking(true);
  const my = posId;
  const fen = game.fen();
  let res = await Engine.search({ fen, skill: bot.skill, movetime: bot.movetime, depth: bot.depth });
  if (my !== posId) { setThinking(false); return; } // position changed; abort
  if (!res.best){
    // The engine returned no move. ONLY end the game if the position is genuinely terminal.
    if (game.game_over()){ setThinking(false); endGame(); return; }
    // Otherwise it was a hiccup/timeout (common on slow devices in sharp positions):
    // retry once, then fall back to a legal move so the game never stalls or falsely ends.
    res = await Engine.search({ fen, skill: bot.skill, movetime: Math.max(bot.movetime, 800) });
    if (my !== posId) { setThinking(false); return; }
    if (!res.best){
      const legal = game.moves({ verbose: true });
      if (!legal.length){ setThinking(false); endGame(); return; }
      const pick = legal[Math.floor(Math.random() * legal.length)];
      res = { best: pick.from + pick.to + (pick.promotion || ''), cp: res.cp, mate: res.mate };
    }
  }
  setThinking(false);
  const from = res.best.slice(0, 2), to = res.best.slice(2, 4), promo = res.best[4];
  const m = game.move({ from, to, promotion: promo || 'q' });
  if (!m){ return; }
  lastMove = { from: m.from, to: m.to }; posId++;
  if (S.animate) animateMove(m); else renderPosition();
  soundForMove(m);
  onClockMove(m.color);
  renderMoveList();
  persistGame();
  setEvalFromCp(res.cp, res.mate, m.color); // honest-ish from search
  if (game.game_over()){ endGame(); return; }
  refreshEval();
}

async function refreshEval(){
  if (!S.showEval && mode !== 'analysis') { bestForHint = null; return; }
  if (!Engine.ready){ try { await Engine.init(); } catch { return; } }
  const my = posId; const fen = game.fen();
  const res = await Engine.search({ fen, depth: EVAL_DEPTH, skill: 20 });
  if (my !== posId) return;
  bestForHint = res.best;
  setEvalFromCp(res.cp, res.mate, game.turn());
}

/* ---------- evaluation bar ---------- */
function setEvalFromCp(cp, mate, sideToMove){
  let whiteCp;
  if (mate != null){ whiteCp = (sideToMove === 'w' ? 1 : -1) * (mate > 0 ? 1 : -1) * 100000; }
  else if (cp != null){ whiteCp = (sideToMove === 'w' ? 1 : -1) * cp; }
  else return;
  const pct = 1 / (1 + Math.pow(10, -whiteCp / 400)); // 0..1 white winning
  const clamped = clamp(pct, 0.02, 0.98);
  evalFill.style.height = (clamped * 100).toFixed(1) + '%';
  let label;
  if (mate != null){ const n = Math.abs(mate); label = 'M' + n; }
  else { const pawns = (whiteCp / 100); label = (pawns >= 0 ? '+' : '') + pawns.toFixed(1); }
  evalNum.textContent = label;
  evalNum.classList.toggle('neg', whiteCp < 0);
}

/* ==========================================================================
   CLOCKS
   ========================================================================== */
const TC = { 'unlimited': null, '3+2': { base: 180, inc: 2 }, '5+0': { base: 300, inc: 0 }, '10+0': { base: 600, inc: 0 } };
function setupClock(){
  const t = TC[S.time];
  if (clock.timer) clearInterval(clock.timer);
  if (!t){ clock.on = false; clockWrapEls().forEach(e => e.style.display = 'none'); return; }
  clock.on = true; clock.w = t.base; clock.b = t.base; clock.inc = t.inc; clock.active = null;
  clockWrapEls().forEach(e => e.style.display = '');
  renderClocks();
}
function clockWrapEls(){ return [meClock, oppClock]; }
function startClockTicking(){
  if (!clock.on) return;
  if (clock.timer) clearInterval(clock.timer);
  clock.active = game.turn();
  let last = performance.now();
  clock.timer = setInterval(() => {
    if (gameOver || viewPly != null) return;
    const now = performance.now(); const dt = (now - last) / 1000; last = now;
    clock[clock.active] -= dt;
    if (clock[clock.active] <= 0){ clock[clock.active] = 0; renderClocks(); flag(clock.active); }
    renderClocks();
  }, 100);
}
function onClockMove(colorThatMoved){
  if (!clock.on) return;
  clock[colorThatMoved] += clock.inc;
  clock.active = game.turn();
  renderClocks();
  if (!clock.timer) startClockTicking();
}
function flag(color){
  clearInterval(clock.timer); clock.timer = null;
  const loser = color === 'w' ? 'White' : 'Black';
  if (mode === 'play' && S.strength === 'two'){
    const winner = color === 'w' ? 'b' : 'w';
    archiveTwoPlayer(winner, loser + ' flagged on time');
    showBanner((winner === 'w' ? 'White' : 'Black') + ' wins on time', loser + ' flagged');
    Sound.end();
    return;
  }
  const youLost = color === S.resolvedYou;
  concludeGame(youLost ? 'loss' : 'win', loser + ' flagged on time');
  showBanner((youLost ? 'Time out — you lose' : 'You win on time'), loser + ' flagged · ' + recordStr());
  Sound.end();
}
function fmtClock(s){
  s = Math.max(0, Math.ceil(s));
  const m = Math.floor(s / 60), ss = s % 60;
  return m + ':' + String(ss).padStart(2, '0');
}
function renderClocks(){
  if (!clock.on) return;
  const youBottom = orientation === S.resolvedYou;
  const topColor = youBottom ? opp() : S.resolvedYou;
  const botColor = youBottom ? S.resolvedYou : opp();
  oppClock.textContent = fmtClock(clock[topColor]);
  meClock.textContent = fmtClock(clock[botColor]);
  oppClock.classList.toggle('run', clock.active === topColor && !gameOver);
  meClock.classList.toggle('run', clock.active === botColor && !gameOver);
}
function opp(){ return S.resolvedYou === 'w' ? 'b' : 'w'; }

/* ==========================================================================
   CAPTURED MATERIAL
   ========================================================================== */
const VAL = { p: 1, n: 3, b: 3, r: 5, q: 9 };
function renderCaptured(){
  const start = { p: 8, n: 2, b: 2, r: 2, q: 1 };
  const onBoard = { w: { p:0,n:0,b:0,r:0,q:0 }, b: { p:0,n:0,b:0,r:0,q:0 } };
  const b = game.board();
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++){
    const cell = b[r][c]; if (cell && cell.type !== 'k') onBoard[cell.color][cell.type]++;
  }
  // pieces captured BY white = missing black pieces, etc.
  const capByWhite = {}, capByBlack = {};
  let scoreW = 0, scoreB = 0;
  for (const t of ['q','r','b','n','p']){
    capByWhite[t] = start[t] - onBoard.b[t];
    capByBlack[t] = start[t] - onBoard.w[t];
    scoreW += capByWhite[t] * VAL[t];
    scoreB += capByBlack[t] * VAL[t];
  }
  const diff = scoreW - scoreB;
  const youBottom = orientation === S.resolvedYou;
  // top card shows pieces captured by the top player; bottom by bottom player
  const topIsWhite = (youBottom ? opp() : S.resolvedYou) === 'w';
  paintTray(oppCaptured, topIsWhite ? capByWhite : capByBlack, topIsWhite ? 'b' : 'w');
  paintTray(meCaptured, topIsWhite ? capByBlack : capByWhite, topIsWhite ? 'w' : 'b');
  // material advantage badge on the leader's tray
  const topAdv = topIsWhite ? diff : -diff;
  oppAdv.textContent = topAdv > 0 ? '+' + topAdv : '';
  meAdv.textContent = -topAdv > 0 ? '+' + (-topAdv) : '';
}
function paintTray(node, caps, capturedColor){
  node.innerHTML = '';
  for (const t of ['q','r','b','n','p']){
    for (let i = 0; i < caps[t]; i++){
      const mini = el('span', 'mini');
      mini.innerHTML = PIECE_SVG[capturedColor + t.toUpperCase()];
      node.appendChild(mini);
    }
  }
}

/* ==========================================================================
   MOVE LIST + REVIEW NAV
   ========================================================================== */
function renderMoveList(){
  const hist = game.history({ verbose: true });
  movesEl.innerHTML = '';
  for (let i = 0; i < hist.length; i += 2){
    const row = el('div', 'mrow');
    row.appendChild(el('span', 'mno', (i / 2 + 1) + '.'));
    row.appendChild(moveSpan(hist[i], i + 1));
    if (hist[i + 1]) row.appendChild(moveSpan(hist[i + 1], i + 2));
    else row.appendChild(el('span', 'san', ''));
    movesEl.appendChild(row);
  }
  highlightPly();
  movesEl.scrollTop = movesEl.scrollHeight;
}
function moveSpan(m, ply){
  const txt = m.from + '→' + m.to + (m.promotion ? '=' + m.promotion.toUpperCase() : '');
  const s = el('span', 'san', txt);
  s.dataset.ply = ply;
  return s;
}
function highlightPly(){
  const live = game.history().length;
  const cur = viewPly == null ? live : viewPly;
  movesEl.querySelectorAll('.san').forEach(s => s.classList.toggle('on', +s.dataset.ply === cur));
}
function gotoPly(ply){
  const total = game.history().length;
  ply = clamp(ply, 0, total);
  viewPly = (ply === total) ? null : ply;
  const src = viewPly == null ? game : positionAtPly(viewPly);
  // set lastMove for the viewed ply
  if (viewPly != null && viewPly > 0){
    const g2 = new Chess(); const h = game.history(); let mm = null;
    for (let i = 0; i < viewPly; i++) mm = g2.move(h[i]);
    lastMove = mm ? { from: mm.from, to: mm.to } : null;
  }
  selected = null; legalTargets = [];
  renderPosition();
  highlightPly();
}
function goLive(){ viewPly = null; selected = null; legalTargets = []; if (game.history().length){ /* keep lastMove */ } renderPosition(); highlightPly(); }

/* ==========================================================================
   PROMOTION UI
   ========================================================================== */
function askPromotion(color, cb){
  promoEl.innerHTML = '';
  promoEl.classList.add('show');
  ['q','r','b','n'].forEach(t => {
    const b = el('button', 'promo-pc');
    b.innerHTML = PIECE_SVG[color + t.toUpperCase()];
    b.onclick = () => { promoEl.classList.remove('show'); cb(t); };
    promoEl.appendChild(b);
  });
  const cancel = el('button', 'promo-cancel', '✕');
  cancel.onclick = () => { promoEl.classList.remove('show'); selected = null; legalTargets = []; refreshHighlights(); };
  promoEl.appendChild(cancel);
}

/* ==========================================================================
   THINKING / BANNER / TOAST
   ========================================================================== */
function setThinking(on, msg){
  thinking = on;
  oppThink.textContent = on ? (msg || 'thinking…') : '';
  oppThink.classList.toggle('show', on);
}
function showBanner(title, sub){
  gameOver = true;
  bannerTitle.textContent = title;
  bannerSub.textContent = sub || '';
  banner.classList.add('show');
}
function hideBanner(){ banner.classList.remove('show'); }
let toastTimer;
function toast(msg){
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function endGame(){
  if (mode === 'play' && S.strength === 'two'){ endGameTwoPlayer(); return; }
  clearInterval(clock.timer); clock.timer = null;
  let title = 'Game over', sub = '', kind = 'draw', reason = '';
  if (game.in_checkmate()){
    const loser = game.turn();
    const youLost = loser === S.resolvedYou && mode === 'play';
    title = mode === 'play' ? (youLost ? 'Checkmate — you lose' : 'Checkmate — you win!') : 'Checkmate';
    reason = (loser === 'w' ? 'White' : 'Black') + ' mated';
    sub = reason; kind = youLost ? 'loss' : 'win';
    if (mode === 'play' && !youLost) Sound.win(); else Sound.end();
  } else if (game.in_stalemate()){ title = 'Stalemate'; reason = 'Stalemate'; sub = 'Draw'; Sound.end(); }
  else if (game.in_threefold_repetition()){ title = 'Draw'; reason = 'Threefold repetition'; sub = reason; Sound.end(); }
  else if (game.insufficient_material()){ title = 'Draw'; reason = 'Insufficient material'; sub = reason; Sound.end(); }
  else if (game.in_draw()){ title = 'Draw'; reason = 'Fifty-move rule'; sub = reason; Sound.end(); }
  concludeGame(kind, reason);
  if (mode === 'play') sub += ' · ' + recordStr();
  showBanner(title, sub);
}

/* ==========================================================================
   INTERACTION: tap + drag (pointer events, mouse & touch)
   ========================================================================== */
let drag = null; // {el, from, ghost, startX, startY, moved}
function attachBoardEvents(){
  const layerParent = boardEl.parentElement; // board frame
  layerParent.addEventListener('pointerdown', (e) => {
    if (e.button != null && e.button !== 0) return;
    const sq = pointToSq(e.clientX, e.clientY);
    if (!sq) return;
    const piece = (viewPly != null ? positionAtPly(viewPly) : game).get(sq);
    const turn = game.turn();
    // begin selection/drag if it's a movable piece
    if (piece && piece.color === turn && userControlsSide(turn) && viewPly == null && !gameOver){
      Sound.prime();
      onSquareActivate(sq); // selects + shows dots
      const pieceElm = sqEl.get(sq);
      if (pieceElm){
        drag = { el: pieceElm, from: sq, startX: e.clientX, startY: e.clientY, moved: false };
        pieceElm.classList.add('dragging');
        layerParent.setPointerCapture?.(e.pointerId);
        moveDragTo(e.clientX, e.clientY);
      }
      e.preventDefault();
    } else {
      // tap on empty/opponent square: either complete a move or clear
      onSquareActivate(sq);
    }
  });
  layerParent.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
    if (!drag.moved && Math.hypot(dx, dy) > 5) drag.moved = true;
    if (drag.moved) moveDragTo(e.clientX, e.clientY);
  });
  const finish = (e) => {
    if (!drag) return;
    const d = drag; drag = null;
    d.el.classList.remove('dragging');
    d.el.style.zIndex = '';
    d.el.style.transition = '';
    if (d.moved){
      const sq = pointToSq(e.clientX, e.clientY);
      const target = legalTargets.find(t => t.to === sq);
      if (target){ commitUserMove(d.from, sq); }
      else { snapBack(d.el, d.from); } // illegal → snap
    } else {
      snapBack(d.el, d.from); // was a tap; selection already handled
    }
  };
  layerParent.addEventListener('pointerup', finish);
  layerParent.addEventListener('pointercancel', finish);
}
function moveDragTo(clientX, clientY){
  const r = boardEl.getBoundingClientRect();
  const size = r.width / 8;
  const x = clientX - r.left - size / 2;
  const y = clientY - r.top - size / 2;
  drag.el.style.zIndex = 30;
  drag.el.style.transition = 'none';
  drag.el.style.transform = `translate(${(x / r.width) * 800}%, ${(y / r.height) * 800}%) scale(1.06)`;
}
function snapBack(pieceElm, sq){
  pieceElm.style.transition = '';
  const { col, row } = sqToXY(sq);
  pieceElm.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
}
